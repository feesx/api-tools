<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <!-- 背景 -->
  <rect width="1200" height="675" fill="#f5f7fa"/>
  
  <!-- 蓝色头部 -->
  <rect x="0" y="0" width="1200" height="60" fill="#3182ce"/>
  
  <!-- 头部文字 -->
  <text x="20" y="40" fill="white" font-size="24" font-family="Arial, sans-serif" font-weight="bold">API Tools</text>
  
  <!-- 头部按钮 -->
  <rect x="800" y="15" width="100" height="30" rx="4" fill="white"/>
  <text x="810" y="35" fill="#3182ce" font-size="14" font-family="Arial, sans-serif" font-weight="bold">API Testing</text>
  
  <rect x="910" y="15" width="100" height="30" rx="4" fill="#2b6cb0"/>
  <text x="920" y="35" fill="white" font-size="14" font-family="Arial, sans-serif" font-weight="bold">JSON Format</text>
  
  <rect x="1020" y="15" width="100" height="30" rx="4" fill="#2b6cb0"/>
  <text x="1030" y="35" fill="white" font-size="14" font-family="Arial, sans-serif" font-weight="bold">XML Format</text>
  
  <rect x="1130" y="15" width="60" height="30" rx="4" fill="#2b6cb0"/>
  <text x="1140" y="35" fill="white" font-size="14" font-family="Arial, sans-serif" font-weight="bold">English</text>
  
  <!-- 左侧历史记录面板 -->
  <rect x="0" y="60" width="200" height="615" fill="#2d3748"/>
  
  <!-- 历史记录标题 -->
  <text x="10" y="85" fill="white" font-size="14" font-family="Arial, sans-serif" font-weight="bold">HISTORY</text>
  
  <!-- 历史记录项 -->
  <rect x="10" y="100" width="180" height="60" rx="4" fill="#4a5568"/>
  <text x="20" y="120" fill="white" font-size="12" font-family="Arial, sans-serif">GET</text>
  <text x="20" y="135" fill="#a0aec0" font-size="10" font-family="Arial, sans-serif">jsonplaceholder.typicode.com/todos/1</text>
  <text x="20" y="150" fill="#48bb78" font-size="10" font-family="Arial, sans-serif">200</text>
  
  <!-- 主内容区域 -->
  <rect x="200" y="60" width="1000" height="615" fill="#ffffff"/>
  
  <!-- 请求配置 -->
  <text x="210" y="90" fill="#2d3748" font-size="16" font-family="Arial, sans-serif" font-weight="bold">GET</text>
  
  <!-- URL 输入框 -->
  <rect x="250" y="75" width="750" height="30" rx="4" fill="#edf2f7" stroke="#cbd5e0" stroke-width="1"/>
  <text x="260" y="95" fill="#4a5568" font-size="14" font-family="Arial, sans-serif">https://jsonplaceholder.typicode.com/todos/1</text>
  
  <!-- 发送按钮 -->
  <rect x="1010" y="75" width="80" height="30" rx="4" fill="#3182ce"/>
  <text x="1030" y="95" fill="white" font-size="14" font-family="Arial, sans-serif" font-weight="bold">Send</text>
  
  <!-- 标签页 -->
  <rect x="210" y="120" width="180" height="30" fill="#edf2f7" stroke="#cbd5e0" stroke-width="1"/>
  <text x="220" y="140" fill="#4a5568" font-size="14" font-family="Arial, sans-serif" font-weight="bold">QUERY PARAMETERS</text>
  
  <rect x="390" y="120" width="120" height="30" fill="#ffffff" stroke="#cbd5e0" stroke-width="1"/>
  <text x="400" y="140" fill="#718096" font-size="14" font-family="Arial, sans-serif">HEADERS</text>
  
  <!-- 响应区域 -->
  <rect x="210" y="160" width="980" height="480" rx="4" fill="#f7fafc" stroke="#e2e8f0" stroke-width="1"/>
  
  <!-- 响应标题 -->
  <text x="220" y="185" fill="#2d3748" font-size="16" font-family="Arial, sans-serif" font-weight="bold">Response</text>
  
  <!-- 响应状态 -->
  <rect x="850" y="170" width="120" height="24" rx="4" fill="#48bb78"/>
  <text x="860" y="185" fill="white" font-size="12" font-family="Arial, sans-serif" font-weight="bold">Copy Response</text>
  
  <rect x="980" y="170" width="120" height="24" rx="4" fill="#48bb78"/>
  <text x="990" y="185" fill="white" font-size="12" font-family="Arial, sans-serif" font-weight="bold">Download Response</text>
  
  <!-- 响应信息 -->
  <rect x="220" y="210" width="960" height="40" rx="4" fill="#c6f6d5"/>
  <text x="230" y="235" fill="#276749" font-size="14" font-family="Arial, sans-serif">Request successful</text>
  
  <!-- 响应统计 -->
  <rect x="220" y="260" width="960" height="40" rx="4" fill="#f8f9fa" stroke="#e9ecef" stroke-width="1"/>
  <text x="230" y="285" fill="#495057" font-size="12" font-family="Arial, sans-serif">Status: 200 OK  Time: 17ms  Size: 83 bytes</text>
  
  <!-- 响应内容 -->
  <rect x="220" y="310" width="960" height="320" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  
  <!-- JSON 响应 -->
  <text x="230" y="335" fill="#718096" font-size="14" font-family="monospace">{</text>
  <text x="250" y="355" fill="#718096" font-size="14" font-family="monospace"><tspan fill="#2b6cb0">"userId"</tspan>: <tspan fill="#b83280">1</tspan>,</text>
  <text x="250" y="375" fill="#718096" font-size="14" font-family="monospace"><tspan fill="#2b6cb0">"id"</tspan>: <tspan fill="#b83280">1</tspan>,</text>
  <text x="250" y="395" fill="#718096" font-size="14" font-family="monospace"><tspan fill="#2b6cb0">"title"</tspan>: <tspan fill="#22543d">"delectus aut autem"</tspan>,</text>
  <text x="250" y="415" fill="#718096" font-size="14" font-family="monospace"><tspan fill="#2b6cb0">"completed"</tspan>: <tspan fill="#dd6b20">false</tspan></text>
  <text x="230" y="435" fill="#718096" font-size="14" font-family="monospace">}</text>
</svg>
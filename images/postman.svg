<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="800" height="450" fill="#f5f5f5"/>
  
  <!-- 标题栏 -->
  <rect width="800" height="50" fill="#2196f3"/>
  <text x="20" y="35" fill="white" font-size="20" font-family="Arial">API Tools - Postman</text>
  
  <!-- 左侧历史记录面板 -->
  <rect x="0" y="50" width="200" height="400" fill="#e0e0e0"/>
  <text x="100" y="70" fill="#333" font-size="14" font-family="Arial" text-anchor="middle">HISTORY</text>
  
  <!-- 主内容区域 -->
  <rect x="200" y="50" width="600" height="400" fill="white"/>
  
  <!-- HTTP方法下拉框 -->
  <rect x="220" y="80" width="80" height="30" fill="#e0e0e0" rx="4"/>
  <text x="260" y="100" fill="#333" font-size="14" font-family="Arial" text-anchor="middle">GET</text>
  
  <!-- URL输入框 -->
  <rect x="310" y="80" width="350" height="30" fill="#f5f5f5" rx="4" stroke="#e0e0e0" stroke-width="1"/>
  <text x="330" y="100" fill="#666" font-size="14" font-family="Arial">http://localhost:8080</text>
  
  <!-- Send按钮 -->
  <rect x="670" y="80" width="80" height="30" fill="#4caf50" rx="4"/>
  <text x="710" y="100" fill="white" font-size="14" font-family="Arial" text-anchor="middle">Send</text>
  
  <!-- 标签页 -->
  <rect x="220" y="130" width="120" height="30" fill="#e0e0e0"/>
  <text x="280" y="150" fill="#333" font-size="14" font-family="Arial" text-anchor="middle">QUERY PARAMETERS</text>
  
  <rect x="340" y="130" width="80" height="30" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"/>
  <text x="380" y="150" fill="#666" font-size="14" font-family="Arial" text-anchor="middle">HEADERS</text>
  
  <!-- 参数表格 -->
  <rect x="220" y="170" width="530" height="100" fill="#f5f5f5" rx="4" stroke="#e0e0e0" stroke-width="1"/>
  <text x="250" y="190" fill="#666" font-size="12" font-family="Arial">Key</text>
  <text x="400" y="190" fill="#666" font-size="12" font-family="Arial">Value</text>
  <text x="550" y="190" fill="#666" font-size="12" font-family="Arial">Description</text>
  
  <!-- 响应区域 -->
  <rect x="220" y="290" width="530" height="130" fill="#f5f5f5" rx="4" stroke="#e0e0e0" stroke-width="1"/>
  <text x="240" y="310" fill="#333" font-size="14" font-family="Arial">响应</text>
  <text x="400" y="360" fill="#666" font-size="12" font-family="Arial" text-anchor="middle">响应结果将显示在这里</text>
  
  <!-- 操作按钮 -->
  <rect x="630" y="390" width="60" height="20" fill="#2196f3" rx="4"/>
  <text x="660" y="405" fill="white" font-size="12" font-family="Arial" text-anchor="middle">复制响应</text>
  
  <rect x="700" y="390" width="60" height="20" fill="#ff9800" rx="4"/>
  <text x="730" y="405" fill="white" font-size="12" font-family="Arial" text-anchor="middle">下载响应</text>
</svg>
  <text x="80" y="225" fill="#333" font-size="12" font-family="Arial">&lt;description&gt;一个格式化XML的工具&lt;/description&gt;</text>
  <text x="80" y="245" fill="#333" font-size="12" font-family="Arial">&lt;features&gt;</text>
  <text x="100" y="265" fill="#333" font-size="12" font-family="Arial">&lt;feature&gt;格式化XML&lt;/feature&gt;</text>
  <text x="100" y="285" fill="#333" font-size="12" font-family="Arial">&lt;feature&gt;语法高亮&lt;/feature&gt;</text>
  <text x="100" y="305" fill="#333" font-size="12" font-family="Arial">&lt;feature&gt;错误验证&lt;/feature&gt;</text>
  <text x="100" y="325" fill="#333" font-size="12" font-family="Arial">&lt;feature&gt;复制功能&lt;/feature&gt;</text>
  <text x="100" y="345" fill="#333" font-size="12" font-family="Arial">&lt;feature&gt;下载功能&lt;/feature&gt;</text>
  <text x="80" y="365" fill="#333" font-size="12" font-family="Arial">&lt;/features&gt;</text>
  <text x="60" y="385" fill="#333" font-size="12" font-family="Arial">&lt;/root&gt;</text>
  
  <!-- 操作按钮 -->
  <rect x="40" y="410" width="80" height="25" fill="#4caf50" rx="4"/>

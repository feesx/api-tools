  <text x="600" y="285" fill="#9c27b0" font-size="12" font-family="Arial">&lt;/feature&gt;</text>
  <text x="490" y="305" fill="#9c27b0" font-size="12" font-family="Arial">&lt;feature&gt;</text>
  <text x="540" y="305" fill="#4caf50" font-size="12" font-family="Arial">错误验证</text>
  <text x="600" y="305" fill="#9c27b0" font-size="12" font-family="Arial">&lt;/feature&gt;</text>
  <text x="490" y="325" fill="#9c27b0" font-size="12" font-family="Arial">&lt;feature&gt;</text>

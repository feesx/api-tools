<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Tools</title>
    <style>
        body {
            width: 500px;
            padding: 15px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            margin: 0;
        }
        
        .container {
            text-align: center;
        }
        
        h1 {
            margin: 0 0 15px 0;
            font-size: 18px;
            color: #2196f3;
            font-weight: 600;
        }
        
        .input-section {
            margin-bottom: 15px;
        }
        
        textarea {
            width: 100%;
            min-height: 150px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            resize: vertical;
            box-sizing: border-box;
        }
        
        .actions {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .action-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
        }
        
        .format-btn {
            background-color: #2196f3;
            color: white;
        }
        
        .format-btn:hover {
            background-color: #1976d2;
        }
        
        .clear-btn {
            background-color: #6c757d;
            color: white;
        }
        
        .clear-btn:hover {
            background-color: #5a6268;
        }
        
        .copy-btn {
            background-color: #28a745;
            color: white;
        }
        
        .copy-btn:hover {
            background-color: #218838;
        }
        
        .output-section {
            margin-top: 15px;
            text-align: left;
        }
        
        .output-section h2 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #333;
        }
        
        .output-container {
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 10px;
            max-height: 300px;
            overflow: auto;
        }
        
        pre {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.5;
        }
        
        .json-key {
            color: #d63384;
            font-weight: 600;
        }
        
        .json-string {
            color: #059669;
        }
        
        .json-number {
            color: #d73a49;
        }
        
        .json-boolean {
            color: #005cc5;
        }
        
        .json-null {
            color: #6f42c1;
        }
        
        .json-object, .json-array {
            color: #005cc5;
        }
        
        .json-punctuation {
            color: #22863a;
        }
        
        .error {
            background-color: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 10px;
            font-size: 13px;
        }
        
        .success {
            background-color: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 10px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>API Tools</h1>
        
        <div class="input-section">
            <textarea id="jsonInput" placeholder="在此粘贴JSON字符串..."></textarea>
        </div>
        
        <div class="actions">
            <button class="action-btn format-btn" id="formatBtn">格式化</button>
            <button class="action-btn copy-btn" id="copyBtn">复制</button>
            <button class="action-btn clear-btn" id="clearBtn">清空</button>
        </div>
        
        <div style="margin-top: 15px;">
            <button class="action-btn format-btn" id="openFormatterBtn">Open Formatter</button>
        </div>
        
        <div id="message"></div>
        
        <div class="output-section" id="outputSection" style="display: none;">
            <h2>格式化结果：</h2>
            <div class="output-container">
                <pre id="jsonOutput"></pre>
            </div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
